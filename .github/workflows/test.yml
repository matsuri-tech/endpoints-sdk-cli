name: Lint and Test

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    timeout-minutes: 5
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Use Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version-file: package.json
      - uses: ./.github/actions/pnpm-install
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
        env:
          CI: true
  test:
    runs-on: ubuntu-latest
    name: Test
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Use Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version-file: package.json
      - uses: ./.github/actions/pnpm-install
      - name: Test
        run: pnpm coverage
        env:
          CI: true

      - name: Upload coverage to artifacts
        # Assumes the push trigger only runs on the default branch
        if: github.event_name == 'push'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-main
          path: coverage/
          retention-days: 7

      - name: Download coverage from main
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=$(gh run list --workflow "${{ github.workflow }}" --branch ${{ github.event.repository.default_branch }} --status success --limit 1 --json databaseId --jq '.[0].databaseId')
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
        continue-on-error: true

      - name: Download artifact
        if: github.event_name == 'pull_request' && env.RUN_ID != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-main
          run-id: ${{ env.RUN_ID }}
          github-token: ${{ github.token }}
          path: coverage-main
        continue-on-error: true

      - name: Ensure coverage files exist
        if: github.event_name == 'pull_request'
        run: |
          if [ ! -f coverage-main/coverage-summary.json ]; then
            echo "Main branch coverage not found, using current coverage for comparison."
            mkdir -p coverage-main
            cp coverage/coverage-summary.json coverage-main/coverage-summary.json
          fi

      - name: Report Coverage
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@8b157684c6a6b259b97d45e72b44242865c0f6a5 # v2.12.2
        with:
          json-summary-compare-path: coverage-main/coverage-summary.json
          file-coverage-mode: all
